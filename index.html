<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mačacia veštiareň</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="fortune-card">
      <div class="cat-head">
        <img src="images/cat-face.png" alt="Mačacia tvár">
      </div>
      <div class="paws">
        <div class="paw paw-left"></div>
        <div class="paw paw-right"></div>
      </div>
      <div class="content">
        <h1>Mačacia veštiaren</h1>
        <p>Stlač tajomné tlačidlo a mačka ti odhalí svojou veštbou tvoj ďalší krok.</p>
        <button id="fortuneButton" class="mystic-button">Zavolaj osud</button>
        <div class="fortune-visual">
          <img id="ballImage" src="images/fortune-ball.svg" alt="Magická veštidlová guľa">
        </div>
        <div id="fortuneText" class="fortune-text">Čakám na tvoje ťapkanie...</div>
        <div class="app-version">verzia 1.0</div>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
